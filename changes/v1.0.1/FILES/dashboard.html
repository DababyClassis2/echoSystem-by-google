<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalShare Web Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #02040a; color: #e1e7ef; }
        .glass { background: rgba(13, 17, 23, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Sidebar - Left Pane (Folder Tree & Status) -->
    <aside class="w-72 glass flex flex-col border-r border-white/5">
        <div class="p-6 border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-600/20">
                    <i data-lucide="share-2" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg">LocalShare</h1>
                    <span id="status" class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">• Online</span>
                </div>
            </div>
        </div>

        <nav class="flex-1 p-4 overflow-y-auto scrollbar-hide space-y-2">
            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest px-2 mb-4">Repository</h3>
            <button onclick="loadFiles()" class="w-full flex items-center gap-3 px-3 py-2 rounded-xl bg-white/5 text-indigo-400 border border-indigo-500/10">
                <i data-lucide="folder-open" class="w-5 h-5"></i>
                <span class="text-sm font-medium">Root Directory</span>
            </button>
            <div class="space-y-1 opacity-60">
                <div class="flex items-center gap-3 px-3 py-2">
                    <i data-lucide="image" class="w-4 h-4"></i>
                    <span class="text-sm">Photos</span>
                </div>
                <div class="flex items-center gap-3 px-3 py-2">
                    <i data-lucide="film" class="w-4 h-4"></i>
                    <span class="text-sm">Videos</span>
                </div>
            </div>
        </nav>

        <div class="p-6 border-t border-white/5 bg-white/[0.01]">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs text-slate-500">Node ID</span>
                <span id="deviceId" class="text-xs font-mono text-indigo-400">WEB-CORE</span>
            </div>
            <p class="text-[10px] text-slate-600">Secure AES-256 local tunnel active.</p>
        </div>
    </aside>

    <!-- Main Content - Right Pane -->
    <main class="flex-1 flex flex-col min-w-0">
        <!-- Toolbar -->
        <header class="h-20 glass flex items-center justify-between px-8 border-b border-white/5">
            <div class="flex items-center gap-4 flex-1">
                <div class="relative w-full max-w-md">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                    <input type="text" id="search" placeholder="Search files..." class="w-full bg-white/5 border border-white/10 rounded-xl py-2 pl-12 pr-4 text-sm focus:outline-none focus:border-indigo-500/50 transition-all">
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="loadFiles()" class="p-2.5 rounded-xl hover:bg-white/5 text-slate-400" title="Refresh">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
                <input type="file" id="uploader" class="hidden" multiple onchange="uploadFiles(this.files)">
                <button onclick="document.getElementById('uploader').click()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 px-6 rounded-xl flex items-center gap-2 shadow-lg shadow-indigo-600/20 transition-all active:scale-95">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    <span>Quick Upload</span>
                </button>
            </div>
        </header>

        <!-- Grid -->
        <div id="file-grid" class="flex-1 overflow-y-auto p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 content-start">
            <!-- Files injected here -->
        </div>

        <!-- Progress Footer (Task 10/11) -->
        <div id="progress-container" class="sticky bottom-0 h-16 glass border-t border-indigo-500/10 px-8 flex items-center justify-between pointer-events-none opacity-0 transition-opacity">
            <div class="flex items-center gap-4">
                <div class="w-8 h-8 bg-indigo-600/20 rounded-lg flex items-center justify-center text-indigo-400">
                    <i data-lucide="upload-cloud" class="w-5 h-5"></i>
                </div>
                <div>
                    <p id="progress-name" class="text-xs font-bold truncate max-w-xs">Uploading file...</p>
                    <div class="w-48 h-1 bg-white/10 rounded-full mt-1 overflow-hidden">
                        <div id="progress-bar" class="h-full bg-indigo-600 w-0 transition-all"></div>
                    </div>
                </div>
            </div>
            <span id="progress-percent" class="text-xs font-bold text-indigo-400">0%</span>
        </div>
    </main>

    <script>
        lucide.createIcons();
        
        async function loadFiles() {
            try {
                const res = await fetch('/web/files');
                const files = await res.json();
                const grid = document.getElementById('file-grid');
                grid.innerHTML = files.map(f => `
                    <div class="glass p-5 rounded-2xl border border-white/5 hover:border-indigo-500/20 transition-all group">
                        <div class="flex items-start justify-between mb-4">
                            <div class="p-3 rounded-xl bg-indigo-600/10 text-indigo-400">
                                <i data-lucide="${f.type === 'image' ? 'image' : f.type === 'video' ? 'film' : 'file-text'}" class="w-6 h-6"></i>
                            </div>
                            <button onclick="deleteFile('${f.name}')" class="p-2 text-slate-600 hover:text-red-400 transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <h4 class="font-bold text-sm truncate mb-1" title="${f.name}">${f.name}</h4>
                        <p class="text-[10px] text-slate-500 uppercase font-bold tracking-tighter">${f.formattedSize} • ${f.extension}</p>
                        <a href="/web/download?fileName=${encodeURIComponent(f.name)}" class="mt-4 w-full flex items-center justify-center gap-2 py-2 rounded-xl bg-white/5 border border-white/5 text-[10px] font-black uppercase tracking-widest hover:bg-indigo-600 hover:text-white transition-all">
                            <i data-lucide="download" class="w-3 h-3"></i>
                            Download
                        </a>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch(e) { console.error(e); }
        }

        async function uploadFiles(files) {
            const container = document.getElementById('progress-container');
            container.style.opacity = '1';
            
            for(let file of files) {
                document.getElementById('progress-name').innerText = file.name;
                const fd = new FormData();
                fd.append('file', file);
                
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/web/upload');
                xhr.upload.onprogress = (e) => {
                    const p = Math.round((e.loaded / e.total) * 100);
                    document.getElementById('progress-bar').style.width = p + '%';
                    document.getElementById('progress-percent').innerText = p + '%';
                };
                xhr.onload = () => {
                    if(xhr.status === 200) loadFiles();
                };
                xhr.send(fd);
            }
            setTimeout(() => container.style.opacity = '0', 2000);
        }

        async function deleteFile(name) {
            if(!confirm('Permanently delete file?')) return;
            await fetch('/web/delete?fileName=' + encodeURIComponent(name), { method: 'POST' });
            loadFiles();
        }

        loadFiles();
    </script>
</body>
</html>
