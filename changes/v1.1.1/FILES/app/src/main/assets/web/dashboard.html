<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>echoSystem | Mesh Dashboard</title>
    <script src="tailwind.js"></script>
    <script src="lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --resonance-bg: #0B0E11; --resonance-surface: #1C1F26; --resonance-accent: #3ECF8E; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--resonance-bg); color: #E2E8F0; }
        .glass { background: rgba(28, 31, 38, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(62, 207, 142, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(62, 207, 142, 0); } 100% { box-shadow: 0 0 0 0 rgba(62, 207, 142, 0); } }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 glass border-b border-white/5 py-4 px-6 md:px-12">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-resonance-accent rounded-xl flex items-center justify-center status-pulse"><i data-lucide="zap" class="text-black"></i></div>
                <div><h1 class="text-xl font-bold">echoSystem</h1><p class="text-[10px] opacity-40">v1.1.1 Refinement</p></div>
            </div>
            <button id="upload-btn" class="bg-resonance-accent text-black px-4 py-2 rounded-lg font-bold text-sm">Transmit</button>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto p-6 md:p-12">
        <div id="file-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        <div id="empty-state" class="hidden text-center py-32"><h2 class="text-2xl font-bold">The Registry is Silent</h2><p class="opacity-40">No resonance found here.</p></div>
    </main>
    <div id="preview-modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/90"></div>
        <div class="glass max-w-4xl w-full h-[80vh] rounded-3xl relative z-10 flex flex-col p-4">
            <div id="preview-content" class="flex-1 overflow-auto"></div>
            <button id="close-preview" class="mt-4 bg-white/10 p-3 rounded-xl">Close</button>
        </div>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
