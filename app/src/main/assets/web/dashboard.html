<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LocalShare Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #020409;
            --card-dark: #0B0E14;
            --border-dark: #1E293B;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .glass {
            background: rgba(11, 14, 20, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .tab-btn.active {
            color: var(--primary);
        }
        .tab-btn.active i {
            transform: translateY(-2px);
            filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.5));
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-20">
    <!-- Header -->
    <header class="glass sticky top-0 z-50 px-5 py-4 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600/20 rounded-xl flex items-center justify-center text-indigo-500 border border-indigo-500/20">
                <i data-lucide="share-2" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="font-extrabold text-lg tracking-tight">Portal</h1>
                <div id="connectionStatus" class="flex items-center gap-1.5 opacity-60">
                    <span id="statusDot" class="w-1.5 h-1.5 rounded-full bg-red-500"></span>
                    <span id="statusText" class="text-[10px] font-bold uppercase tracking-widest">Scanning...</span>
                </div>
            </div>
        </div>
        <button onclick="loadLibrary()" class="p-2.5 bg-white/5 rounded-xl border border-white/5 hover:bg-white/10 transition-all active:scale-95">
            <i data-lucide="refresh-cw" class="w-5 h-5 text-slate-300"></i>
        </button>
        <button id="manageBtn" onclick="openManagement()" class="hidden p-2.5 bg-indigo-600/10 rounded-xl border border-indigo-500/20 hover:bg-indigo-600/20 transition-all active:scale-95">
            <i data-lucide="shield-check" class="w-5 h-5 text-indigo-400"></i>
        </button>
    </header>

    <!-- Management Section (Security Registry) -->
    <div id="managementSection" class="fixed inset-0 z-[60] bg-[#020409] animate-in opacity-0 pointer-events-none transition-all duration-300 flex flex-col p-6">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h2 class="text-2xl font-black">Security Registry</h2>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Authorized Network Nodes</p>
            </div>
            <button onclick="closeManagement()" class="p-2 bg-white/5 rounded-xl border border-white/5">
                <i data-lucide="x" class="w-6 h-6 text-slate-300"></i>
            </button>
        </div>
        <div id="deviceList" class="space-y-4 overflow-y-auto pb-10">
            <!-- List of devices injected via JS -->
        </div>
    </div>

    <!-- Auth Overlay -->
    <div id="authSection" class="fixed inset-0 z-50 glass flex items-center justify-center p-6 transition-all duration-500 opacity-0 pointer-events-none">
        <div class="w-full max-w-sm space-y-8 text-center">
            <div class="inline-flex p-5 rounded-3xl bg-indigo-600/10 text-indigo-500 border border-indigo-500/20 animate-pulse">
                <i data-lucide="shield-check" class="w-12 h-12"></i>
            </div>
            <div class="space-y-2">
                <h2 class="text-2xl font-black">Secure Link</h2>
                <p class="text-slate-400 text-sm font-medium px-4">Enter the synchronization key from your companion app to unlock this portal.</p>
            </div>
            <form id="authForm" class="space-y-4">
                <input 
                    type="tel" 
                    id="pinInput" 
                    maxlength="6"
                    placeholder="••••••"
                    required
                    class="w-full bg-[#0B0E14] border-2 border-slate-800 focus:border-indigo-500 rounded-2xl h-16 text-center text-3xl font-black tracking-[12px] outline-none transition-all placeholder:tracking-normal placeholder:font-bold placeholder:text-slate-800"
                >
                <button type="submit" class="w-full h-14 bg-indigo-600 hover:bg-indigo-500 active:scale-[0.98] rounded-2xl font-bold text-white shadow-lg shadow-indigo-600/20 transition-all flex items-center justify-center gap-2">
                    <span>Authorize Node</span>
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
                <p id="authError" class="text-red-400 text-xs font-bold hidden"></p>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <main id="dashboard" class="flex-grow p-4 space-y-6">
        <!-- Search bar -->
        <div class="relative group">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within:text-indigo-500 transition-colors"></i>
            <input 
                type="text" 
                id="searchInput"
                placeholder="Find in repository..." 
                class="w-full bg-[#0B0E14] border border-slate-800/60 rounded-2xl h-12 pl-12 pr-4 text-sm font-medium outline-none focus:border-indigo-500 focus:ring-4 ring-indigo-600/5 transition-all"
            >
        </div>

        <!-- Category Grid / Display Area -->
        <div id="contentGrid" class="grid grid-cols-2 gap-4">
            <!-- Cards injected via JS -->
        </div>

        <!-- Transmission Queue -->
        <div id="queueSection" class="hidden space-y-4">
            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest px-1">Active Transfers</h3>
            <div id="queueList" class="space-y-2"></div>
        </div>
    </main>

    <!-- Floating Actions -->
    <div class="fixed bottom-24 right-5 flex flex-col gap-3">
        <button id="uploadFab" onclick="document.getElementById('fileSelector').click()" class="w-14 h-14 bg-indigo-600 text-white rounded-2xl shadow-xl shadow-indigo-600/30 flex items-center justify-center active:scale-95 transition-all">
            <i data-lucide="plus" class="w-7 h-7"></i>
        </button>
        <input type="file" id="fileSelector" class="hidden" multiple>
    </div>

    <!-- Bottom Categories -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0B0E14]/95 backdrop-blur-md border-t border-slate-800/60 flex justify-around py-2 z-40 safe-area-bottom">
        <button onclick="switchCategory('all')" id="tab-all" class="tab-btn flex flex-col items-center text-indigo-400">
            <i data-lucide="folder-open" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold mt-1">All</span>
        </button>
        <button onclick="switchCategory('image')" id="tab-image" class="tab-btn flex flex-col items-center text-slate-500">
            <i data-lucide="image" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold mt-1">Photos</span>
        </button>
        <button onclick="switchCategory('video')" id="tab-video" class="tab-btn flex flex-col items-center text-slate-500">
            <i data-lucide="film" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold mt-1">Videos</span>
        </button>
        <button onclick="switchCategory('music')" id="tab-music" class="tab-btn flex flex-col items-center text-slate-500">
            <i data-lucide="music" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold mt-1">Music</span>
        </button>
        <button onclick="switchCategory('document')" id="tab-document" class="tab-btn flex flex-col items-center text-slate-500">
            <i data-lucide="file-text" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold mt-1">Docs</span>
        </button>
    </nav>

    <script>
        let pairingPin = localStorage.getItem('pairingPin') || '';
        let deviceId = localStorage.getItem('deviceId') || '';
        let activeCategory = 'all';
        let fileLibrary = [];
        let searchQuery = '';
        let userPermissions = [];

        if (!deviceId) {
            deviceId = 'web-' + Math.random().toString(36).substring(2, 10);
            localStorage.setItem('deviceId', deviceId);
        }

        const authOverlay = document.getElementById('authSection');
        const managementSection = document.getElementById('managementSection');
        const contentGrid = document.getElementById('contentGrid');
        const queueList = document.getElementById('queueList');
        const queueSection = document.getElementById('queueSection');
        const authForm = document.getElementById('authForm');
        const authError = document.getElementById('authError');
        const searchInput = document.getElementById('searchInput');
        const deviceList = document.getElementById('deviceList');
        const manageBtn = document.getElementById('manageBtn');

        async function checkConnection() {
            if (!pairingPin) {
                showAuth();
                return;
            }
            try {
                const res = await fetch('/web/files', {
                    headers: { 'X-PIN': pairingPin, 'X-Device-Id': deviceId }
                });
                if (res.ok) {
                    hideAuth();
                    loadLibrary();
                    loadPermissions();
                } else {
                    showAuth();
                    if (res.status === 403) authError.textContent = "Blocked by host.";
                }
            } catch (e) {
                showAuth();
            }
        }

        async function loadPermissions() {
            try {
                const res = await fetch('/web/permissions', {
                    headers: { 'X-PIN': pairingPin, 'X-Device-Id': deviceId }
                });
                if (res.ok) {
                    userPermissions = await res.json();
                    if (userPermissions.includes('MANAGE_PERMISSIONS')) {
                        manageBtn.classList.remove('hidden');
                    }
                    
                    const canUpload = userPermissions.includes('UPLOAD_FILES') || userPermissions.includes('MANAGE_PERMISSIONS');
                    const uploadBtn = document.getElementById('uploadFab');
                    if (uploadBtn) {
                        if (canUpload) uploadBtn.classList.remove('hidden');
                        else uploadBtn.classList.add('hidden');
                    }
                    
                    renderContent(); // Re-render to update action visibility
                }
            } catch (e) { console.error(e); }
        }

        function showAuth() {
            authOverlay.classList.remove('opacity-0', 'pointer-events-none');
            authOverlay.classList.add('opacity-100');
            document.getElementById('statusDot').className = "w-1.5 h-1.5 rounded-full bg-red-500";
            document.getElementById('statusText').textContent = "Scanning...";
        }

        function hideAuth() {
            authOverlay.classList.remove('opacity-100');
            authOverlay.classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('statusDot').className = "w-1.5 h-1.5 rounded-full bg-emerald-500";
            document.getElementById('statusText').textContent = "Paired Connected";
        }

        async function openManagement() {
            managementSection.classList.remove('opacity-0', 'pointer-events-none');
            managementSection.classList.add('opacity-100');
            loadTrustedDevices();
        }

        function closeManagement() {
            managementSection.classList.add('opacity-0', 'pointer-events-none');
            managementSection.classList.remove('opacity-100');
        }

        async function loadTrustedDevices() {
            try {
                const res = await fetch('/web/manage/trusted', {
                    headers: { 'X-PIN': pairingPin, 'X-Device-Id': deviceId }
                });
                if (res.ok) {
                    const devices = await res.json();
                    renderDevices(devices);
                }
            } catch (e) { console.error(e); }
        }

        function renderDevices(devices) {
            deviceList.innerHTML = '';
            const allPerms = ['BROWSE_FILES', 'UPLOAD_FILES', 'DOWNLOAD_FILES', 'DELETE_FILES', 'MANAGE_PERMISSIONS'];
            
            devices.forEach(dev => {
                const card = document.createElement('div');
                card.className = `p-5 rounded-3xl border ${dev.blocked ? 'border-red-500/20 bg-red-500/5' : 'border-white/5 bg-[#0B0E14]'}`;
                
                let permChips = allPerms.map(p => {
                    const active = dev.permissions.includes(p);
                    return `<button onclick="togglePerm('${dev.id}', '${p}', ${active})" class="px-2 py-1 m-0.5 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all ${active ? 'bg-indigo-600 text-white' : 'bg-white/5 text-slate-500'}">${p.replace('_FILES', '')}</button>`;
                }).join('');

                card.innerHTML = `
                    <div class="flex items-start justify-between mb-4">
                        <div>
                            <h4 class="font-bold text-sm ${dev.blocked ? 'text-red-400' : ''}">${dev.name}</h4>
                            <p class="text-[10px] text-slate-500 font-mono">${dev.id.substring(0, 16)}...</p>
                        </div>
                        <span class="px-2 py-0.5 rounded text-[8px] font-black uppercase tracking-widest ${dev.blocked ? 'bg-red-500/20 text-red-400' : 'bg-emerald-500/20 text-emerald-400'}">
                            ${dev.blocked ? 'Blocked' : 'Active'}
                        </span>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        ${permChips}
                    </div>
                `;
                deviceList.appendChild(card);
            });
        }

        async function togglePerm(targetId, perm, currentActive) {
            // Find current device permissions first from a global or local store if needed, 
            // but for simplicity we'll just refetch or re-fetch in target
            const res = await fetch('/web/manage/trusted', {
                 headers: { 'X-PIN': pairingPin, 'X-Device-Id': deviceId }
            });
            const devices = await res.json();
            const dev = devices.find(d => d.id === targetId);
            if (!dev) return;

            let newPerms = dev.permissions;
            if (currentActive) {
                newPerms = newPerms.filter(p => p !== perm);
            } else {
                newPerms.push(perm);
            }

            const updateRes = await fetch('/web/manage/permissions', {
                method: 'POST',
                headers: { 
                    'X-PIN': pairingPin, 
                    'X-Device-Id': deviceId,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ targetDeviceId: targetId, permissions: newPerms })
            });

            if (updateRes.ok) loadTrustedDevices();
        }

        authForm.onsubmit = async (e) => {
            e.preventDefault();
            const pin = document.getElementById('pinInput').value;
            authError.classList.add('hidden');
            
            try {
                const res = await fetch('/pairing/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ deviceId, pin, deviceName: 'Web Portal' })
                });

                if (res.ok || res.status === 401) { 
                    pairingPin = pin;
                    localStorage.setItem('pairingPin', pin);
                    hideAuth();
                    loadLibrary();
                } else {
                    authError.textContent = "Link Refused.";
                    authError.classList.remove('hidden');
                }
            } catch (e) {
                authError.textContent = "Offline.";
                authError.classList.remove('hidden');
            }
        };

        async function loadLibrary() {
            try {
                const res = await fetch('/web/files', {
                    headers: { 'X-PIN': pairingPin, 'X-Device-Id': deviceId }
                });
                if (res.ok) {
                    fileLibrary = await res.json();
                    renderContent();
                }
            } catch (e) { console.error(e); }
        }

        function renderContent() {
            contentGrid.innerHTML = '';
            let filtered = fileLibrary;
            
            if (activeCategory !== 'all') {
                filtered = filtered.filter(f => f.type === activeCategory);
            }
            if (searchQuery) {
                filtered = filtered.filter(f => f.name.toLowerCase().includes(searchQuery.toLowerCase()));
            }

            if (filtered.length === 0) {
                contentGrid.innerHTML = '<div class="col-span-2 py-20 text-center opacity-40 text-xs font-bold uppercase tracking-widest">Empty Repository</div>';
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-[#0B0E14] border border-white/5 rounded-3xl p-4 space-y-3 animate-in active:scale-[0.97] transition-all";
                
                const iconMap = { image: 'image', video: 'film', music: 'music', document: 'file-text' };
                const icon = iconMap[item.type] || 'file';
                const colorMap = { image: 'text-emerald-400', video: 'text-amber-400', music: 'text-pink-400', document: 'text-indigo-400' };
                const color = colorMap[item.type] || 'text-slate-400';

                const canDelete = userPermissions.includes('DELETE_FILES') || userPermissions.includes('MANAGE_PERMISSIONS');
                const canDownload = userPermissions.includes('DOWNLOAD_FILES') || userPermissions.includes('MANAGE_PERMISSIONS');

                card.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="p-3 bg-white/5 rounded-2xl ${color}">
                            <i data-lucide="${icon}" class="w-6 h-6"></i>
                        </div>
                        ${canDelete ? `
                        <button onclick="event.stopPropagation(); deleteFile('${encodeURIComponent(item.name)}')" class="p-2 text-slate-600 hover:text-red-400">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                        ` : ''}
                    </div>
                    <div class="space-y-1">
                        <p class="text-xs font-bold truncate leading-tight">${item.name}</p>
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-tighter">${item.formattedSize} • ${item.extension}</p>
                    </div>
                    ${canDownload ? `
                    <a href="/web/download?fileName=${encodeURIComponent(item.name)}&pin=${pairingPin}&deviceId=${deviceId}" class="flex items-center justify-center gap-2 w-full py-2 bg-white/5 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest hover:bg-white/10">
                        <i data-lucide="download" class="w-3 h-3"></i>
                        Download
                    </a>
                    ` : ''}
                `;
                contentGrid.appendChild(card);
            });
            lucide.createIcons();
        }

        searchInput.oninput = (e) => {
            searchQuery = e.target.value;
            renderContent();
        };

        function switchCategory(cat) {
            activeCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.replace('text-indigo-400', 'text-slate-500'));
            document.getElementById('tab-' + cat).classList.replace('text-slate-500', 'text-indigo-400');
            renderContent();
        }

        async function deleteFile(name) {
            if (!confirm('Permanent delete?')) return;
            const res = await fetch(`/web/delete?fileName=${name}`, {
                method: 'POST',
                headers: { 'X-PIN': pairingPin, 'X-Device-Id': deviceId }
            });
            if (res.ok) loadLibrary();
        }

        document.getElementById('fileSelector').onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(uploadFile);
        };

        function uploadFile(file) {
            queueSection.classList.remove('hidden');
            const id = 'up-' + Math.random().toString(36).substring(2, 7);
            const row = document.createElement('div');
            row.id = id;
            row.className = "bg-[#0B0E14] border border-white/5 rounded-2xl p-4 flex items-center justify-between";
            row.innerHTML = `
                <div class="flex items-center gap-3 min-w-0">
                    <div class="h-8 w-8 bg-indigo-600/10 text-indigo-500 rounded-lg flex items-center justify-center shrink-0">
                        <i data-lucide="upload-cloud" class="w-5 h-5"></i>
                    </div>
                    <div class="min-w-0">
                        <p class="text-xs font-bold truncate">${file.name}</p>
                        <div class="h-1 bg-white/5 rounded-full mt-1.5 w-32 overflow-hidden">
                            <div id="bar-${id}" class="h-full bg-indigo-600 w-0 transition-all duration-300"></div>
                        </div>
                    </div>
                </div>
                <span id="pct-${id}" class="text-[10px] font-black text-slate-500">0%</span>
            `;
            queueList.appendChild(row);
            lucide.createIcons();

            const xhr = new XMLHttpRequest();
            const fd = new FormData();
            fd.append('file', file);
            xhr.open('POST', '/web/upload');
            xhr.setRequestHeader('X-PIN', pairingPin);
            xhr.setRequestHeader('X-Device-Id', deviceId);
            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const p = Math.round((e.loaded / e.total) * 100);
                    document.getElementById(`bar-${id}`).style.width = p + '%';
                    document.getElementById(`pct-${id}`).textContent = p + '%';
                }
            };
            xhr.onload = () => {
                if (xhr.status === 200) {
                    document.getElementById(id).classList.add('border-emerald-500/30', 'bg-emerald-500/5');
                    setTimeout(() => { document.getElementById(id).remove(); if (!queueList.children.length) queueSection.classList.add('hidden'); }, 2000);
                    loadLibrary();
                }
            };
            xhr.send(fd);
        }

        checkConnection();
        lucide.createIcons();
    </script>
</body>
</html>
