<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>echoSystem | Mesh Dashboard</title>
    <script src="tailwind.js"></script>
    <script src="lucide.min.js"></script>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --resonance-bg: #0B0E11;
            --resonance-surface: #1C1F26;
            --resonance-accent: #3ECF8E;
            --resonance-error: #FF4D4D;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--resonance-bg);
            color: #E2E8F0;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .glass {
            background: rgba(28, 31, 38, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .category-tab {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .category-tab.active {
            background: rgba(62, 207, 142, 0.1);
            color: var(--resonance-accent);
            border-bottom: 2px solid var(--resonance-accent);
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Brick 4 - Visual Pulse */
        .status-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(62, 207, 142, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(62, 207, 142, 0); }
            100% { box-shadow: 0 0 0 0 rgba(62, 207, 142, 0); }
        }

        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .flash-green { animation: flashGreen 1s ease-out; }
        @keyframes flashGreen {
            0% { background: rgba(62, 207, 142, 0.2); }
            100% { background: transparent; }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <nav class="sticky top-0 z-50 glass border-b border-white/5 py-4 px-6 md:px-12">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-resonance-accent rounded-xl flex items-center justify-center status-pulse">
                    <i data-lucide="zap" class="text-black fill-current"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">echoSystem</h1>
                    <p class="text-xs text-white/40 uppercase tracking-widest">Mesh Node Refined v1.1.1</p>
                </div>
            </div>
            
            <div class="flex items-center gap-6">
                <div id="connection-badge" class="hidden md:flex items-center gap-2 text-xs px-3 py-1 rounded-full bg-white/5 border border-white/10">
                    <span class="w-2 h-2 rounded-full bg-resonance-accent"></span>
                    <span class="mono opacity-80" id="node-ip">CONNECTED</span>
                </div>
                <button id="upload-btn" class="bg-resonance-accent hover:bg-emerald-400 text-black px-4 py-2 rounded-lg font-bold text-sm transition-colors flex items-center gap-2">
                    <i data-lucide="upload" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Transmit</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 md:p-12">
        <!-- Explorer Container -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <!-- Sidebar / Categories -->
            <aside class="lg:col-span-1 space-y-6">
                <div class="glass p-6 rounded-2xl space-y-2">
                    <h3 class="text-xs uppercase tracking-widest text-white/30 mb-4 font-bold">Categories</h3>
                    <button class="category-tab active w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 text-left" data-category="all">
                        <i data-lucide="layout-grid" class="w-4 h-4"></i>
                        <span>Registry</span>
                    </button>
                    <button class="category-tab w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 text-left" data-category="photos">
                        <i data-lucide="image" class="w-4 h-4"></i>
                        <span>Imagery</span>
                    </button>
                    <button class="category-tab w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 text-left" data-category="docs">
                        <i data-lucide="file-text" class="w-4 h-4"></i>
                        <span>Archives</span>
                    </button>
                    <button class="category-tab w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 text-left" data-category="media">
                        <i data-lucide="play-circle" class="w-4 h-4"></i>
                        <span>Media</span>
                    </button>
                </div>

                <!-- Active Sessions -->
                <div id="transfer-queue" class="glass rounded-2xl overflow-hidden hidden">
                    <div class="bg-white/5 p-4 flex justify-between items-center">
                        <h3 class="text-xs font-bold uppercase tracking-widest text-resonance-accent">Active Mesh Streams</h3>
                        <span id="queue-count" class="mono text-[10px] bg-resonance-accent text-black px-1.5 rounded">0</span>
                    </div>
                    <div id="queue-list" class="p-4 space-y-4 max-h-60 overflow-y-auto">
                        <!-- Queue items injected here -->
                    </div>
                </div>
            </aside>

            <!-- File Grid Area -->
            <div class="lg:col-span-3 space-y-6">
                <!-- Breadcrumbs -->
                <div class="flex items-center gap-4 text-sm opacity-50 px-2" id="breadcrumb-container">
                    <i data-lucide="home" class="w-4 h-4"></i>
                    <span>root</span>
                </div>

                <div id="file-grid" class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- Loading State -->
                    <div class="col-span-full py-20 flex flex-col items-center justify-center opacity-30 animate-pulse">
                        <i data-lucide="refresh-cw" class="w-12 h-12 mb-4 animate-spin"></i>
                        <p class="mono text-xs uppercase tracking-widest">Synchronizing Mesh...</p>
                    </div>
                </div>

                <!-- Empty State (Hidden) -->
                <div id="empty-state" class="hidden col-span-full py-32 flex flex-col items-center justify-center text-center px-6">
                    <div class="w-24 h-24 bg-white/5 rounded-full flex items-center justify-center mb-6">
                        <i data-lucide="file-minus" class="w-10 h-10 opacity-20"></i>
                    </div>
                    <h2 class="text-2xl font-bold mb-2">The Registry is Silent</h2>
                    <p class="max-w-md opacity-40 mb-8">No resonance found in this directory. Transmit something to begin the synchronization.</p>
                    <button class="bg-white/10 hover:bg-white/20 px-6 py-3 rounded-xl transition-all font-bold" onclick="document.getElementById('file-input').click()">
                        Initialize Upload
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Hidden Inputs -->
    <input type="file" id="file-input" multiple class="hidden">

    <!-- Preview Modal (Brick 1) -->
    <div id="preview-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" id="modal-overlay"></div>
        <div class="glass max-w-4xl w-full h-[80vh] rounded-3xl relative z-10 flex flex-col overflow-hidden fade-in">
            <div class="p-4 border-b border-white/10 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i id="preview-icon" data-lucide="file" class="w-5 h-5 text-resonance-accent"></i>
                    <h3 id="preview-title" class="font-bold truncate max-w-xs md:max-w-md">filename.ext</h3>
                </div>
                <button id="close-preview" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div id="preview-content" class="flex-1 bg-black flex items-center justify-center overflow-auto p-4">
                <!-- Preview injected here -->
            </div>
            <div class="p-6 bg-white/5 flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex flex-col">
                    <span id="preview-size" class="text-xs mono opacity-50">0 KB</span>
                    <span id="preview-type" class="text-[10px] uppercase tracking-widest text-resonance-accent font-bold">unknown</span>
                </div>
                <div class="flex gap-4 w-full sm:w-auto">
                    <button id="preview-download" class="flex-1 sm:flex-initial bg-resonance-accent text-black px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                        <i data-lucide="download" class="w-4 h-4"></i>
                        Download
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-8 right-8 z-[110] translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        <div class="glass p-4 rounded-2xl flex items-center gap-4 border border-resonance-accent/20 pr-8 shadow-2xl">
            <div id="toast-icon-bg" class="w-10 h-10 rounded-xl bg-resonance-accent/20 flex items-center justify-center">
                <i data-lucide="check" id="toast-icon" class="text-resonance-accent w-5 h-5"></i>
            </div>
            <div>
                <p id="toast-msg" class="text-sm font-bold">Transfer Pulse Complete</p>
                <p id="toast-sub" class="text-[10px] opacity-40 uppercase tracking-widest mono">2.4 MB Transmitted</p>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
